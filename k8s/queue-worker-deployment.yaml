apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: sporteventbook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: queue-worker
  template:
    metadata:
      labels:
        app: queue-worker
    spec:
      containers:
      - name: queue-worker
        image: registry.bercalab.my.id/sporteventbook/app:latest
        command:
        - php
        - artisan
        - queue:work
        - --sleep=3
        - --tries=3
        - --max-time=3600
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
      imagePullSecrets:
      - name: harbor-secret