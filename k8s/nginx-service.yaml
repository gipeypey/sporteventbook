apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: sporteventbook
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.10.10.100"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 443
    targetPort: 443
    name: https
  selector:
    app: nginx