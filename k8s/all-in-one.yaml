# SportEventBook - All-in-One Kubernetes Manifest
# For DKP Kommander Dashboard Deployment
# 
# Usage:
# 1. DKP Kommander UI → Applications → Deploy Application
# 2. Select "Upload YAML" or "Paste YAML"
# 3. Paste entire content of this file
# 4. Deploy to sporteventbook namespace

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: sporteventbook
  labels:
    name: sporteventbook

---
# ConfigMap - Application Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: sporteventbook
data:
  APP_NAME: "SportEventBook"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://sport.bercalab.my.id"
  
  DB_CONNECTION: "mysql"
  DB_HOST: "192.168.2.61"
  DB_PORT: "3306"
  DB_DATABASE: "sporteventbook"
  DB_USERNAME: "root"
  
  CACHE_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  SESSION_DRIVER: "redis"
  
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  
  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "info"

---
# Secret - Application Secrets
# IMPORTANT: Update with actual values before deploying!
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: sporteventbook
type: Opaque
stringData:
  APP_KEY: "base64:your-app-key-here"
  DB_PASSWORD: "P@ssw0rd"
  MIDTRANS_SERVER_KEY: "Mid-server-QO31L-owEDPoRNuWdLBOyFFx"
  MIDTRANS_CLIENT_KEY: "Mid-client-duVgQAN4ELE6SarI"

---
# Secret - Harbor Registry Credentials
# IMPORTANT: Update with actual Harbor password!
apiVersion: v1
kind: Secret
metadata:
  name: harbor-secret
  namespace: sporteventbook
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: '{"auths":{"registry.bercalab.my.id":{"username":"admin","password":"Harbor12345","auth":"YWRtaW46eW91ci1oYXJib3ItcGFzc3dvcmQ="}}}'

---
# PersistentVolumeClaim - App Storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-storage-pvc
  namespace: sporteventbook
  annotations:
    csi.nutanix.com/storage-type: kVolumes
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: nutanix-volume

---
# Service - Laravel FPM
apiVersion: v1
kind: Service
metadata:
  name: laravel-app
  namespace: sporteventbook
spec:
  type: ClusterIP
  ports:
  - port: 9000
    targetPort: 9000
    name: fpm
  selector:
    app: laravel

---
# Deployment - Laravel Application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-app
  namespace: sporteventbook
  labels:
    app: laravel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laravel
  template:
    metadata:
      labels:
        app: laravel
    spec:
      containers:
      - name: laravel
        image: registry.bercalab.my.id/sporteventbook/app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9000
          name: fpm
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
        volumeMounts:
        - name: storage-volume
          mountPath: /var/www/html/storage
        - name: bootstrap-cache
          mountPath: /var/www/html/bootstrap/cache
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: storage-volume
        persistentVolumeClaim:
          claimName: app-storage-pvc
      - name: bootstrap-cache
        emptyDir: {}
      imagePullSecrets:
      - name: harbor-secret

---
# Deployment - Nginx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: sporteventbook
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        - containerPort: 443
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: nginx-html
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: nginx-html
        emptyDir: {}
      imagePullSecrets:
      - name: harbor-secret

---
# ConfigMap - Nginx Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: sporteventbook
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass laravel-app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
        }

        location ~ /\.ht {
            deny all;
        }

        location ~ /\.env {
            deny all;
        }
    }

---
# Service - Nginx LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: sporteventbook
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.10.10.100"
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 443
    targetPort: 443
    name: https
  selector:
    app: nginx

---
# Deployment - Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sporteventbook
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Service - Redis
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sporteventbook
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis

---
# Deployment - Queue Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: sporteventbook
  labels:
    app: queue-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue-worker
  template:
    metadata:
      labels:
        app: queue-worker
    spec:
      containers:
      - name: queue-worker
        image: registry.bercalab.my.id/sporteventbook/app:latest
        command:
        - php
        - artisan
        - queue:work
        - --queue=database,default
        - --sleep=3
        - --max-jobs=1000
        - --max-time=3600
        - --stop-when-empty
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      imagePullSecrets:
      - name: harbor-secret

---
# CronJob - Laravel Scheduler
apiVersion: batch/v1
kind: CronJob
metadata:
  name: laravel-scheduler
  namespace: sporteventbook
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  suspend: true
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: scheduler
            image: registry.bercalab.my.id/sporteventbook/app:latest
            command:
            - php
            - artisan
            - schedule:run
            envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
            env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
          restartPolicy: OnFailure
          imagePullSecrets:
          - name: harbor-secret

---
# Job - Database Migration
# Run this job once after initial deployment
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: sporteventbook
spec:
  template:
    spec:
      containers:
      - name: migrate
        image: registry.bercalab.my.id/sporteventbook/app:latest
        command:
        - php
        - artisan
        - migrate
        - --force
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
      restartPolicy: OnFailure
      imagePullSecrets:
      - name: harbor-secret
  backoffLimit: 3