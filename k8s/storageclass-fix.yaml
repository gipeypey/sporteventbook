# New StorageClass with StorageType parameter for Nutanix CSI
# Apply this first to fix the PVC pending issue

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nutanix-volume-fixed
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
parameters:
  csi.storage.k8s.io/controller-expand-secret-name: nutanix-csi-credentials
  csi.storage.k8s.io/controller-expand-secret-namespace: ntnx-system
  csi.storage.k8s.io/node-publish-secret-name: nutanix-csi-credentials
  csi.storage.k8s.io/node-publish-secret-namespace: ntnx-system
  csi.storage.k8s.io/provisioner-secret-name: nutanix-csi-credentials
  csi.storage.k8s.io/provisioner-secret-namespace: ntnx-system
  fsType: ext4
  storageContainer: NKP-SelfServiceContainer
  StorageType: kVolumes
provisioner: csi.nutanix.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---
# Updated PVC using the new StorageClass
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-storage-pvc
  namespace: sporteventbook
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: nutanix-volume-fixed