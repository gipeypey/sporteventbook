apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: sporteventbook
data:
  APP_NAME: "SportEventBook"
  APP_ENV: "production"
  APP_DEBUG: "true"
  APP_URL: "https://sport.bercalab.my.id"
  
  DB_CONNECTION: "mysql"
  DB_HOST: "192.168.2.61"    # Pastikan ini IP NDB Anda yang benar!
  DB_PORT: "3306"
  DB_DATABASE: "sporteventbook"
  DB_USERNAME: "root"        # Ganti jika user NDB Anda bukan root
  
  CACHE_STORE: "redis"       # Perbedaan Laravel 11/12 (Store, bukan Driver)
  CACHE_DRIVER: "redis" 
  QUEUE_CONNECTION: "redis"
  SESSION_DRIVER: "redis"
  
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_CLIENT: "phpredis"
  
  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "info"
