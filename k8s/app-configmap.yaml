apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: sporteventbook
data:
  APP_NAME: "SportEventBook"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://sport.bercalab.my.id"
  
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "sporteventbook"
  DB_USERNAME: "sporteventbook"
  
  CACHE_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  SESSION_DRIVER: "redis"
  
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  
  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "info"