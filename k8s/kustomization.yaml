# Kustomization for Flux CD GitOps
# DKP Kommander will use this file to deploy resources

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sporteventbook

# Resources to deploy
resources:
  - all-in-one.yaml

# Common labels to apply to all resources
commonLabels:
  app.kubernetes.io/name: sporteventbook
  app.kubernetes.io/managed-by: flux

# Patches for environment-specific configuration
# IMPORTANT: Update these values with your actual NDB MySQL details!
patches:
  # Patch ConfigMap with actual NDB MySQL values
  - patch: |-
      - op: replace
        path: /data/DB_HOST
        value: "192.168.2.61"        # ← GANTI: NDB MySQL Host/IP
      - op: replace
        path: /data/DB_DATABASE
        value: "sporteventbook"      # ← GANTI: Database Name
      - op: replace
        path: /data/DB_USERNAME
        value: "root"           # ← GANTI: DB Username
    target:
      kind: ConfigMap
      name: app-config
      version: v1

  # NOTE: Secrets (DB_PASSWORD, APP_KEY, MIDTRANS_*) dibuat MANUAL setelah deploy
  # Gunakan script: ./create-secrets.sh
  # Atau via kubectl create secret / DKP Kommander UI

  # Patch Service LoadBalancer IP
  # HAPUS patch ini jika ingin MetalLB auto-assign IP
  # - patch: |-
