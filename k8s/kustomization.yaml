# Kustomization for Flux CD GitOps
# DKP Kommander will use this file to deploy resources

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sporteventbook

# Resources to deploy
resources:
  - mysql-all-in-one.yaml  # MySQL Database (in-cluster)
  - all-in-one.yaml        # Laravel + Nginx + Redis (Redis included)

# Common labels to apply to all resources
commonLabels:
  app.kubernetes.io/name: sporteventbook
  app.kubernetes.io/managed-by: flux
