# Kustomization for Flux CD GitOps
# DKP Kommander will use this file to deploy resources

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sporteventbook

# Resources to deploy
resources:
  - all-in-one.yaml

# Common labels to apply to all resources
commonLabels:
  app.kubernetes.io/name: sporteventbook
  app.kubernetes.io/managed-by: flux

# Patches for environment-specific configuration
# IMPORTANT: Update these values before committing to Git!
patches:
  # Patch ConfigMap with actual values
  - patch: |-
      - op: replace
        path: /data/DB_HOST
        value: "your-ndb-mysql-host"
      - op: replace
        path: /data/DB_DATABASE
        value: "your-database-name"
      - op: replace
        path: /data/DB_USERNAME
        value: "your-db-username"
    target:
      kind: ConfigMap
      name: app-config
      version: v1

  # NOTE: For secrets (DB_PASSWORD, APP_KEY, etc.), it's recommended to:
  # 1. Create secrets manually via kubectl or DKP Kommander UI after initial deploy
  # 2. Or use SOPS/External Secrets for GitOps security
  # 
  # To generate APP_KEY:
  #   php artisan key:generate --show
  # Then base64 encode it:
  #   echo -n "base64:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" | base64
  # Or use existing .env APP_KEY value directly

  # Patch Service LoadBalancer IP (optional - remove this patch for auto-assign by MetalLB)
  - patch: |-
      metadata:
        annotations:
          metallb.universe.tf/loadBalancerIPs: "10.10.10.100"
    target:
      kind: Service
      name: nginx-service
      version: v1
