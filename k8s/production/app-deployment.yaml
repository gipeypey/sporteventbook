apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-app
  namespace: sporteventbook
  labels:
    app: laravel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: laravel
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: laravel
    spec:
      containers:
      - name: laravel
        image: harbor.your-domain.com/sporteventbook/app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9000
          name: fpm
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pgrep
            - php-fpm
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - pgrep
            - php-fpm
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        volumeMounts:
        - name: bootstrap-cache
          mountPath: /var/www/html/bootstrap/cache
      volumes:
      - name: bootstrap-cache
        emptyDir: {}
      imagePullSecrets:
      - name: harbor-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: laravel
              topologyKey: kubernetes.io/hostname