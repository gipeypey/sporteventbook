apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: sporteventbook
spec:
  template:
    spec:
      containers:
      - name: migrate
        image: harbor.your-domain.com/sporteventbook/app:latest
        command:
        - php
        - artisan
        - migrate
        - --force
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
      restartPolicy: OnFailure
      imagePullSecrets:
      - name: harbor-secret