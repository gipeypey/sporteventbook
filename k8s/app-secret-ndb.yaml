apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: sporteventbook
type: Opaque
stringData:
  APP_KEY: "base64:YourGeneratedAppKey32Characters=="
  DB_HOST: "ndb-mysql-ip-address"  # Ganti dengan IP MySQL dari NDB
  DB_PORT: "3306"
  DB_DATABASE: "sporteventbook"
  DB_USERNAME: "sporteventbook"
  DB_PASSWORD: "YourNDBMySQLPassword"  # Ganti dengan password dari NDB
  MIDTRANS_SERVER_KEY: "SB-Mid-server-xxxxx"
  MIDTRANS_CLIENT_KEY: "SB-Mid-client-xxxxx"